<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chess AI & PvP</title>
    <style>
        :root { --sq-w: #f0d9b5; --sq-b: #b58863; --hl: rgba(0, 210, 255, 0.5); --check: rgba(255, 0, 0, 0.6); }
        body { margin: 0; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #status { margin-bottom: 15px; font-size: 18px; color: #00d2ff; text-transform: uppercase; letter-spacing: 1px; }
        #board-wrapper { width: 95vw; max-width: 400px; aspect-ratio: 1/1; background: #333; padding: 5px; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #board { display: grid; grid-template-columns: repeat(8, 12.5%); grid-template-rows: repeat(8, 12.5%); width: 100%; height: 100%; }
        .sq { display: flex; align-items: center; justify-content: center; font-size: clamp(25px, 8vw, 40px); position: relative; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .w { background: var(--sq-w); } .b { background: var(--sq-b); }
        .selected { background: var(--hl) !important; }
        .check { background: var(--check) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .hint::after { content: ''; width: 20%; height: 20%; background: rgba(0,0,0,0.1); border-radius: 50%; position: absolute; }
        .piece { z-index: 10; user-select: none; transition: transform 0.2s; }
        .wp { color: #fff; text-shadow: 1px 1px 2px #000; } .bp { color: #000; }
        
        /* Меню и Оверлеи */
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        button { padding: 15px 30px; margin: 10px; background: #444; border: 1px solid #00d2ff; color: #00d2ff; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; width: 220px; }
        button:hover { background: #00d2ff; color: #000; }
    </style>
</head>
<body>

<div id="status">ВЫБЕРИТЕ РЕЖИМ</div>

<div id="board-wrapper"><div id="board"></div></div>

<div id="start-menu" class="overlay">
    <h1 style="color:#00d2ff">CHESS MOBILE</h1>
    <button onclick="startGame('AI')">ИГРАТЬ С ИИ</button>
    <button onclick="startGame('PVP')">ДРУГ (ОДИН ТЕЛЕФОН)</button>
</div>

<div id="end-menu" class="overlay" style="display:none">
    <h1 id="winner-text">МАТ!</h1>
    <button onclick="location.reload()">ИГРАТЬ СНОВА</button>
</div>

<script>
const boardEl = document.getElementById('board');
const statusEl = document.getElementById('status');
const icons = {'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♜','N':'♞','B':'♝','Q':'♛','K':'♚','P':'♟'};

let board = [
    ['r','n','b','q','k','b','n','r'], ['p','p','p','p','p','p','p','p'],
    ['.','.','.','.','.','.','.','.'], ['.','.','.','.','.','.','.','.'],
    ['.','.','.','.','.','.','.','.'], ['.','.','.','.','.','.','.','.'],
    ['P','P','P','P','P','P','P','P'], ['R','N','B','Q','K','B','N','R']
];

let turn = 'W', selected = null, hints = [], gameMode = null, isOver = false;

function startGame(mode) {
    gameMode = mode;
    document.getElementById('start-menu').style.display = 'none';
    statusEl.innerText = "ВАШ ХОД (БЕЛЫЕ)";
    draw();
}

function getPieceLogic(r1, c1, r2, c2, b) {
    const p = b[r1][c1], target = b[r2][c2], dr = Math.abs(r2-r1), dc = Math.abs(c2-c1), pT = p.toUpperCase();
    if (target !== '.' && (p === p.toUpperCase()) === (target === target.toUpperCase())) return false;
    
    if (pT === 'P') {
        const dir = p === 'P' ? -1 : 1;
        if (c1 === c2 && target === '.') {
            if (r2 - r1 === dir) return true;
            if (r2 - r1 === 2 * dir && (r1 === 1 || r1 === 6) && b[r1+dir][c1] === '.') return true;
        }
        return (dr === 1 && dc === 1 && target !== '.');
    }
    if (pT === 'N') return (dr === 2 && dc === 1) || (dr === 1 && dc === 2);
    if (pT === 'K') return dr <= 1 && dc <= 1;
    if (pT === 'R') return (r1 === r2 || c1 === c2) && isPathClear(r1,c1,r2,c2,b);
    if (pT === 'B') return (dr === dc) && isPathClear(r1,c1,r2,c2,b);
    if (pT === 'Q') return (dr === dc || r1 === r2 || c1 === c2) && isPathClear(r1,c1,r2,c2,b);
    return false;
}

function isPathClear(r1, c1, r2, c2, b) {
    const sr = Math.sign(r2-r1), sc = Math.sign(c2-c1);
    let r = r1 + sr, c = c1 + sc;
    while (r !== r2 || c !== c2) { if (b[r][c] !== '.') return false; r += sr; c += sc; }
    return true;
}

function isAttacked(r, c, attackerColor, b) {
    for (let i = 0; i < 8; i++)
        for (let j = 0; j < 8; j++)
            if (b[i][j] !== '.' && (attackerColor === 'W' ? b[i][j] === b[i][j].toUpperCase() : b[i][j] === b[i][j].toLowerCase()))
                if (getPieceLogic(i, j, r, c, b)) return true;
    return false;
}

function getKingPos(color, b) {
    for (let r = 0; r < 8; r++)
        for (let c = 0; c < 8; c++)
            if (b[r][c] === (color === 'W' ? 'K' : 'k')) return {r, c};
}

function canMoveSafe(r1, c1, r2, c2, b) {
    if (!getPieceLogic(r1, c1, r2, c2, b)) return false;
    let temp = b.map(row => [...row]);
    temp[r2][c2] = temp[r1][c1]; temp[r1][c1] = '.';
    const king = getKingPos(temp[r2][c2] === temp[r2][c2].toUpperCase() ? 'W' : 'B', temp);
    return !isAttacked(king.r, king.c, temp[r2][c2] === temp[r2][c2].toUpperCase() ? 'B' : 'W', temp);
}

function checkGameOver() {
    for (let r1 = 0; r1 < 8; r1++)
        for (let c1 = 0; c1 < 8; c1++)
            if (board[r1][c1] !== '.' && (turn === 'W' ? board[r1][c1] === board[r1][c1].toUpperCase() : board[r1][c1] === board[r1][c1].toLowerCase()))
                for (let r2 = 0; r2 < 8; r2++)
                    for (let c2 = 0; c2 < 8; c2++)
                        if (canMoveSafe(r1, c1, r2, c2, board)) return false;
    return true;
}

function clickSq(r, c) {
    if (isOver || (gameMode === 'AI' && turn === 'B')) return;
    const p = board[r][c];
    if (selected) {
        if (canMoveSafe(selected.r, selected.c, r, c, board)) {
            makeMove(selected.r, selected.c, r, c);
            if (isOver) return;
            if (gameMode === 'AI') setTimeout(aiMove, 600);
        } else {
            selected = (p !== '.' && (turn === 'W' ? p === p.toUpperCase() : p === p.toLowerCase())) ? {r, c} : null;
        }
    } else if (p !== '.' && (turn === 'W' ? p === p.toUpperCase() : p === p.toLowerCase())) {
        selected = {r, c};
    }
    updateHints();
    draw();
}

function makeMove(r1, c1, r2, c2) {
    board[r2][c2] = board[r1][c1]; board[r1][c1] = '.';
    if (r2 === 0 && board[r2][c2] === 'P') board[r2][c2] = 'Q';
    if (r2 === 7 && board[r2][c2] === 'p') board[r2][c2] = 'q';
    
    turn = turn === 'W' ? 'B' : 'W';
    selected = null; hints = [];
    
    if (checkGameOver()) {
        isOver = true;
        const king = getKingPos(turn, board);
        const check = isAttacked(king.r, king.c, turn === 'W' ? 'B' : 'W', board);
        document.getElementById('winner-text').innerText = check ? (turn === 'W' ? "ПОБЕДА ЧЕРНЫХ!" : "ПОБЕДА БЕЛЫХ!") : "НИЧЬЯ (ПАТ)";
        document.getElementById('end-menu').style.display = 'flex';
    }
    statusEl.innerText = turn === 'W' ? "ХОД БЕЛЫХ" : "ХОД ЧЕРНЫХ";
    draw();
}

function aiMove() {
    let moves = [];
    const vals = { 'p': 10, 'n': 30, 'b': 30, 'r': 50, 'q': 90, 'k': 900 };
    for (let r1=0; r1<8; r1++)
        for (let c1=0; c1<8; c1++)
            if (board[r1][c1] !== '.' && board[r1][c1] === board[r1][c1].toLowerCase())
                for (let r2=0; r2<8; r2++)
                    for (let c2=0; c2<8; c2++)
                        if (canMoveSafe(r1, c1, r2, c2, board)) {
                            let weight = board[r2][c2] === '.' ? 0 : vals[board[r2][c2].toLowerCase()];
                            moves.push({r1, c1, r2, c2, weight});
                        }
    if (moves.length > 0) {
        moves.sort((a,b) => b.weight - a.weight);
        const best = moves.filter(m => m.weight === moves[0].weight);
        const m = best[Math.floor(Math.random() * best.length)];
        makeMove(m.r1, m.c1, m.r2, m.c2);
    }
}

function updateHints() {
    hints = [];
    if (selected) {
        for (let i = 0; i < 8; i++)
            for (let j = 0; j < 8; j++)
                if (canMoveSafe(selected.r, selected.c, i, j, board)) hints.push({r: i, c: j});
    }
}

function draw() {
    boardEl.innerHTML = '';
    const kingW = getKingPos('W', board), kingB = getKingPos('B', board);
    const checkW = isAttacked(kingW.r, kingW.c, 'B', board);
    const checkB = isAttacked(kingB.r, kingB.c, 'W', board);

    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            const sq = document.createElement('div');
            sq.className = `sq ${(r+c)%2===0?'w':'b'}`;
            if (selected && selected.r === r && selected.c === c) sq.classList.add('selected');
            if (hints.some(h => h.r === r && h.c === c)) sq.classList.add('hint');
            if ((board[r][c] === 'K' && checkW) || (board[r][c] === 'k' && checkB)) sq.classList.add('check');
            
            if (board[r][c] !== '.') {
                const div = document.createElement('div');
                div.className = `piece ${board[r][c] === board[r][c].toUpperCase() ? 'wp' : 'bp'}`;
                div.innerText = icons[board[r][c]];
                sq.appendChild(div);
            }
            sq.onclick = () => clickSq(r, c);
            boardEl.appendChild(sq);
        }
    }
}
</script>
</body>
</html>
