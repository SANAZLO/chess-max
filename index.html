<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chess MAX Edition</title>
    <style>
        :root { --sq-w: #f0d9b5; --sq-b: #b58863; --hl: rgba(0, 210, 255, 0.5); --check: rgba(255, 0, 0, 0.7); }
        body { margin: 0; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        #status { margin-bottom: 15px; font-size: 18px; font-weight: bold; color: #00d2ff; text-align: center; }
        #board-container { width: 92vw; max-width: 400px; aspect-ratio: 1/1; background: #333; padding: 4px; border-radius: 4px; }
        #board { display: grid; grid-template-columns: repeat(8, 1fr); width: 100%; height: 100%; }
        .sq { display: flex; align-items: center; justify-content: center; font-size: clamp(24px, 8vw, 40px); position: relative; }
        .w { background: var(--sq-w); } .b { background: var(--sq-b); }
        .selected { background: var(--hl) !important; }
        .check { background: var(--check) !important; border-radius: 50%; }
        .piece { z-index: 10; user-select: none; -webkit-tap-highlight-color: transparent; cursor: pointer; line-height: 1; }
        /* Явное разделение цветов */
        .white-p { color: #ffffff !important; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .black-p { color: #000000 !important; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        button { padding: 12px 25px; margin: 10px; background: #444; border: 1px solid #00d2ff; color: #00d2ff; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="status">ВЫБЕРИТЕ РЕЖИМ</div>
    <div id="board-container"><div id="board"></div></div>
    <div id="start-menu" class="overlay">
        <h1 style="color:#00d2ff">CHESS MAX</h1>
        <button onclick="startGame('AI')">ИГРАТЬ С ИИ</button>
        <button onclick="startGame('PVP')">ДРУГ (ОДИН ЭКРАН)</button>
    </div>
    <div id="end-menu" class="overlay" style="display:none">
        <h1 id="winner-text">МАТ!</h1>
        <button onclick="location.reload()">ЗАНОВО</button>
    </div>

<script>
const boardEl = document.getElementById('board');
const statusEl = document.getElementById('status');
// Используем РАЗНЫЕ символы для белых и черных
const icons = {
    'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟', // Черные
    'R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙'  // Белые (контурные)
};

let board = [
    ['r','n','b','q','k','b','n','r'], ['p','p','p','p','p','p','p','p'],
    ['.','.','.','.','.','.','.','.'], ['.','.','.','.','.','.','.','.'],
    ['.','.','.','.','.','.','.','.'], ['.','.','.','.','.','.','.','.'],
    ['P','P','P','P','P','P','P','P'], ['R','N','B','Q','K','B','N','R']
];
let selected = null, turn = 'W', gameMode = null, isOver = false;

function startGame(mode) {
    gameMode = mode;
    document.getElementById('start-menu').style.display = 'none';
    statusEl.innerText = "ВАШ ХОД (БЕЛЫЕ)";
    draw();
}

function getPieceLogic(r1, c1, r2, c2, b) {
    const p = b[r1][c1], target = b[r2][c2], dr = Math.abs(r2-r1), dc = Math.abs(c2-c1), pT = p.toUpperCase();
    if (target !== '.' && (p === p.toUpperCase()) === (target === target.toUpperCase())) return false;
    if (pT === 'P') {
        const dir = p === 'P' ? -1 : 1;
        if (c1 === c2 && target === '.') {
            if (r2 - r1 === dir) return true;
            if (r2 - r1 === 2 * dir && (r1 === 1 || r1 === 6) && b[r1+dir][c1] === '.') return true;
        }
        return (dr === 1 && dc === 1 && target !== '.');
    }
    if (pT === 'N') return (dr === 2 && dc === 1) || (dr === 1 && dc === 2);
    if (pT === 'K') return dr <= 1 && dc <= 1;
    if (pT === 'R') return (r1 === r2 || c1 === c2) && isPathClear(r1,c1,r2,c2,b);
    if (pT === 'B') return (dr === dc) && isPathClear(r1,c1,r2,c2,b);
    if (pT === 'Q') return (dr === dc || r1 === r2 || c1 === c2) && isPathClear(r1,c1,r2,c2,b);
    return false;
}

function isPathClear(r1, c1, r2, c2, b) {
    const sr = Math.sign(r2-r1), sc = Math.sign(c2-c1);
    let r = r1 + sr, c = c1 + sc;
    while (r !== r2 || c !== c2) { if (b[r][c] !== '.') return false; r += sr; c += sc; }
    return true;
}

function isAttacked(r, c, attackerColor, b) {
    for (let i = 0; i < 8; i++)
        for (let j = 0; j < 8; j++)
            if (b[i][j] !== '.' && (attackerColor === 'W' ? b[i][j] === b[i][j].toUpperCase() : b[i][j] === b[i][j].toLowerCase()))
                if (getPieceLogic(i, j, r, c, b)) return true;
    return false;
}

function getKingPos(color, b) {
    for (let r = 0; r < 8; r++)
        for (let c = 0; c < 8; c++)
            if (b[r][c] === (color === 'W' ? 'K' : 'k')) return {r, c};
}

function canMoveSafe(r1, c1, r2, c2, b) {
    if (!getPieceLogic(r1, c1, r2, c2, b)) return false;
    let temp = b.map(row => [...row]);
    temp[r2][c2] = temp[r1][c1]; temp[r1][c1] = '.';
    const king = getKingPos(temp[r2][c2] === temp[r2][c2].toUpperCase() ? 'W' : 'B', temp);
    return !isAttacked(king.r, king.c, temp[r2][c2] === temp[r2][c2].toUpperCase() ? 'B' : 'W', temp);
}

function checkGameOver() {
    for (let r1 = 0; r1 < 8; r1++)
        for (let c1 = 0; c1 < 8; c1++)
            if (board[r1][c1] !== '.' && (turn === 'W' ? board[r1][c1] === board[r1][c1].toUpperCase() : board[r1][c1] === board[r1][c1].toLowerCase()))
                for (let r2 = 0; r2 < 8; r2++)
                    for (let c2 = 0; c2 < 8; c2++)
                        if (canMoveSafe(r1, c1, r2, c2, board)) return false;
    return true;
}

function clickSq(r, c) {
    if (isOver || (gameMode === 'AI' && turn === 'B')) return;
    const p = board[r][c];
    if (selected) {
        if (canMoveSafe(selected.r, selected.c, r, c, board)) {
            board[r][c] = board[selected.r][selected.c]; board[selected.r][selected.c] = '.';
            if (r === 0 && board[r][c] === 'P') board[r][c] = 'Q';
            if (r === 7 && board[r][c] === 'p') board[r][c] = 'q';
            turn = turn === 'W' ? 'B' : 'W';
            selected = null; 
            if (checkGameOver()) { finishGame(); }
            else if (gameMode === 'AI') setTimeout(aiMove, 600);
            draw();
        } else { selected = (p !== '.' && (turn === 'W' ? p === p.toUpperCase() : p === p.toLowerCase())) ? {r, c} : null; draw(); }
    } else if (p !== '.' && (turn === 'W' ? p === p.toUpperCase() : p === p.toLowerCase())) { selected = {r, c}; draw(); }
}

function aiMove() {
    let moves = [];
    const vals = { 'p': 10, 'n': 30, 'b': 30, 'r': 50, 'q': 90, 'k': 900 };
    for (let r1=0; r1<8; r1++)
        for (let c1=0; c1<8; c1++)
            if (board[r1][c1] !== '.' && board[r1][c1] === board[r1][c1].toLowerCase())
                for (let r2=0; r2<8; r2++)
                    for (let c2=0; c2<8; c2++)
                        if (canMoveSafe(r1, c1, r2, c2, board)) {
                            let w = board[r2][c2] === '.' ? 0 : vals[board[r2][c2].toLowerCase()];
                            moves.push({r1, c1, r2, c2, w});
                        }
    if (moves.length > 0) {
        moves.sort((a,b) => b.w - a.w);
        const m = moves.filter(x => x.w === moves[0].w)[Math.floor(Math.random() * moves.filter(x => x.w === moves[0].w).length)];
        board[m.r2][m.c2] = board[m.r1][m.c1]; board[m.r1][m.c1] = '.';
        if (board[m.r2][m.c2] === 'p' && m.r2 === 7) board[m.r2][m.c2] = 'q';
        turn = 'W'; if (checkGameOver()) finishGame();
    }
    draw();
}

function finishGame() {
    isOver = true;
    const king = getKingPos(turn, board);
    const check = isAttacked(king.r, king.c, turn === 'W' ? 'B' : 'W', board);
    document.getElementById('winner-text').innerText = check ? (turn === 'W' ? "МАТ! ИИ ПОБЕДИЛ" : "МАТ! ТЫ ПОБЕДИЛ") : "ПАТ / НИЧЬЯ";
    document.getElementById('end-menu').style.display = 'flex';
}

function draw() {
    boardEl.innerHTML = '';
    const kingW = getKingPos('W', board), kingB = getKingPos('B', board);
    const chW = isAttacked(kingW.r, kingW.c, 'B', board), chB = isAttacked(kingB.r, kingB.c, 'W', board);
    statusEl.innerText = turn === 'W' ? "ХОД БЕЛЫХ" : "ХОД ЧЕРНЫХ";

    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            const sq = document.createElement('div');
            sq.className = `sq ${(r+c)%2===0?'w':'b'}`;
            if (selected && selected.r === r && selected.c === c) sq.classList.add('selected');
            if ((board[r][c] === 'K' && chW) || (board[r][c] === 'k' && chB)) sq.classList.add('check');
            if (board[r][c] !== '.') {
                const div = document.createElement('div');
                div.className = `piece ${board[r][c] === board[r][c].toUpperCase() ? 'white-p' : 'black-p'}`;
                div.innerText = icons[board[r][c]];
                sq.appendChild(div);
            }
            sq.onclick = () => clickSq(r, c);
            boardEl.appendChild(sq);
        }
    }
}
</script>
</body>
</html>
